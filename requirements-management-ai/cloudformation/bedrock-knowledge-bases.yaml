# cloudformation/bedrock-knowledge-bases.yaml
AWSTemplateFormatVersion: '2010-09-09'
Description: 'Bedrock Knowledge Bases for Requirements Management'

Parameters:
  DocumentBucketName:
    Type: String
    Description: S3 bucket containing documents
  OpenSearchCollectionArn:
    Type: String
    Description: OpenSearch Serverless collection ARN
  KnowledgeBaseRoleArn:
    Type: String
    Description: IAM role ARN for knowledge base

Resources:
  # Requirements Knowledge Base
  RequirementsKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: requirements-knowledge-base
      Description: Knowledge base for historical requirements and project data
      RoleArn: !Ref KnowledgeBaseRoleArn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'
      StorageConfiguration:
        Type: OPENSEARCH_SERVERLESS
        OpensearchServerlessConfiguration:
          CollectionArn: !Ref OpenSearchCollectionArn
          VectorIndexName: requirements-index
          FieldMapping:
            VectorField: vector
            TextField: text
            MetadataField: metadata

  # Domain Experts Knowledge Base
  ExpertsKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: experts-knowledge-base
      Description: Knowledge base for domain expert profiles and capabilities
      RoleArn: !Ref KnowledgeBaseRoleArn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'
      StorageConfiguration:
        Type: OPENSEARCH_SERVERLESS
        OpensearchServerlessConfiguration:
          CollectionArn: !Ref OpenSearchCollectionArn
          VectorIndexName: experts-index
          FieldMapping:
            VectorField: vector
            TextField: text
            MetadataField: metadata

  # Regulatory Knowledge Base
  RegulatoryKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: regulatory-knowledge-base
      Description: Knowledge base for compliance standards and regulations
      RoleArn: !Ref KnowledgeBaseRoleArn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'
      StorageConfiguration:
        Type: OPENSEARCH_SERVERLESS
        OpensearchServerlessConfiguration:
          CollectionArn: !Ref OpenSearchCollectionArn
          VectorIndexName: regulatory-index
          FieldMapping:
            VectorField: vector
            TextField: text
            MetadataField: metadata

  # Data Sources
  RequirementsDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      KnowledgeBaseId: !Ref RequirementsKnowledgeBase
      Name: requirements-s3-source
      Description: S3 data source for requirements documents
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !Sub 'arn:aws:s3:::${DocumentBucketName}'
          InclusionPrefixes:
            - requirements/
          BucketOwnerAccountId: !Ref AWS::AccountId
      VectorIngestionConfiguration:
        ChunkingConfiguration:
          ChunkingStrategy: FIXED_SIZE
          FixedSizeChunkingConfiguration:
            MaxTokens: 512
            OverlapPercentage: 20

Outputs:
  RequirementsKnowledgeBaseId:
    Description: Requirements Knowledge Base ID
    Value: !Ref RequirementsKnowledgeBase
    Export:
      Name: !Sub '${AWS::StackName}-RequirementsKB'

  ExpertsKnowledgeBaseId:
    Description: Experts Knowledge Base ID
    Value: !Ref ExpertsKnowledgeBase
    Export:
      Name: !Sub '${AWS::StackName}-ExpertsKB'

  RegulatoryKnowledgeBaseId:
    Description: Regulatory Knowledge Base ID
    Value: !Ref RegulatoryKnowledgeBase
    Export:
      Name: !Sub '${AWS::StackName}-RegulatoryKB'
